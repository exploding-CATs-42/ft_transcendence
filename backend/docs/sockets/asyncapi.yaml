asyncapi: "3.0.0"

info:
  title: Transcendence Realtime API
  version: "1.0.0"
  description: >
    Realtime API for the ft_transcendence (Exploding Cats) backend.


    Transport is **Socket.IO** (WebSocket with HTTP long-polling fallback),
    not raw AsyncAPI/WebSocket frames. Each "channel" below maps to a
    Socket.IO **event name**, and each operation maps to a `socket.on(...)`
    listener (the server *receives*) or a `socket.emit(...)` / `io.emit(...)`
    call (the server *sends*).


    ### Authentication

    Every connection must provide a valid JWT **access token** during the
    Socket.IO handshake:

    ```js
    const socket = io(URL, { auth: { token: accessToken } });
    ```

    The token is read from `socket.handshake.auth.token`. A missing token
    rejects the connection with `Authentication token missing`; an invalid
    token rejects it with `Invalid token`. On success the decoded JWT payload
    is stored on `socket.data` (its `sub` claim is the acting user id).


    ### Delivery scope

    Waiting-room events are scoped to a **room** whose name is the `gameId`. The
    server joins/leaves a socket from that room on `join-game` / `leave-game`.
    In the operations below, scope is one of:

    - **acting socket** — only the client that triggered the action
      (`socket.emit`).
    - **room (others)** — everyone in the game room except the actor
      (`socket.to(room).emit`).
    - **room (all)** — everyone in the game room including the actor
      (`io.to(room).emit`).
    - **broadcast** — every connected client (`io.emit`).

  tags:
    - name: Connection
      description: Connection lifecycle and authentication.
    - name: Waiting Room
      description: Pre-game waiting room — join, leave, ready-up and countdown.
    - name: Errors
      description: Per-action error events emitted back to the acting socket.

