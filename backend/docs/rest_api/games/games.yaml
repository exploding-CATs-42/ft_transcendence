paths:
  /games:
    get:
      tags:
        - Games
      summary: Get all games
      description: Returns all currently available games.
      operationId: getGames
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Games returned successfully
          content:
            application/json:
              schema:
                $ref: "./games.schemas.yaml#/components/schemas/GamesResponse"

        "401":
          description: Invalid or missing access token
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Invalid token

        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "./../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: User not found

        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Server error

    post:
      tags:
        - Games
      summary: Create a new game
      description: Creates a new game lobby and adds the current user as the first player.
      operationId: createGame
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./games.schemas.yaml#/components/schemas/CreateGameRequest"

      responses:
        "201":
          description: Game created successfully
          content:
            application/json:
              schema:
                $ref: "./games.schemas.yaml#/components/schemas/GameResponse"

        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./../users/users.schemas.yaml#/components/schemas/ValidationErrorResponse"

        "401":
          description: Invalid or missing access token
          content:
            application/json:
              schema:
                $ref: "./../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Invalid token

        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "./../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: User not found

        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "./../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Server error

  /games/{gameId}:
    get:
      tags:
        - Games
      summary: Get game by id
      description: Returns a single game by its id.
      operationId: getGameById
      security:
        - bearerAuth: []
      parameters:
        - name: gameId
          in: path
          required: true
          description: Game id.
          schema:
            type: string
            format: uuid

      responses:
        "200":
          description: Game returned successfully
          content:
            application/json:
              schema:
                $ref: "./games.schemas.yaml#/components/schemas/GameResponse"

        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./../users/users.schemas.yaml#/components/schemas/ValidationErrorResponse"

        "401":
          description: Invalid or missing access token
          content:
            application/json:
              schema:
                $ref: "./../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Invalid token

        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "./../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: User not found

        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "./../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Server error

    delete:
      tags:
        - Games
      summary: Delete game
      description: Deletes a game by its id.
      operationId: deleteGame
      security:
        - bearerAuth: []
      parameters:
        - name: gameId
          in: path
          required: true
          description: Game id.
          schema:
            type: string
            format: uuid

      responses:
        "201":
          description: Game deleted successfully
          content:
            application/json:
              schema:
                $ref: "./games.schemas.yaml#/components/schemas/DeleteGameResponse"
              example:
                message: Game deleted successfully

        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./../users/users.schemas.yaml#/components/schemas/ValidationErrorResponse"

        "401":
          description: Invalid or missing access token
          content:
            application/json:
              schema:
                $ref: "./../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Invalid token

        "404":
          description: Game not found
          content:
            application/json:
              schema:
                $ref: "./../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Game not found

        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "./../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Server error