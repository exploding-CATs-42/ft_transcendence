paths:
  /games:
    get:
      tags:
        - Games
      summary: Get all games
      description: Returns all games available in the system.
      operationId: getGames
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Games returned successfully
          content:
            application/json:
              schema:
                $ref: "./games.schemas.yaml#/components/schemas/GamesListResponse"
                example:
                  - id: 9cb92b7a-3b28-4af8-854f-a1b6efbda001
                    name: Friday Night Table
                    maxPlayers: 4
                    createdAt: 1745835176910
        "401":
          description: Invalid or missing access token
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Invalid token
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: User not found
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Internal server error
    post:
      tags:
        - Games
      summary: Create a new game
      description: Creates a new game instance and automatically joins the creator as a player.
      operationId: createGame
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./games.schemas.yaml#/components/schemas/CreateGameRequest"
      responses:
        "201":
          description: Game created successfully
          content:
            application/json:
              schema:
                $ref: "./games.schemas.yaml#/components/schemas/GameResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./games.schemas.yaml#/components/schemas/ValidationErrorResponse"
        "401":
          description: Invalid or missing access token
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Invalid token
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: User not found
        "409":
          description: User already has an active or waiting game
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Player already has an active or waiting game
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Internal server error

  /games/current:
    get:
      tags:
        - Games
      summary: Get current active game
      description: Returns the current active or waiting game for the authenticated user. Returns null if none exists.
      operationId: getCurrentGame
      security:
        - bearerAuth: []

      responses:
        "200":
          description: Current game returned successfully (or null)
          content:
            application/json:
              schema:
                $ref: "./games.schemas.yaml#/components/schemas/CurrentGameResponse"

        "401":
          description: Invalid or missing access token
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Invalid token

        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: User not found

        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Internal server error

    delete:
      tags:
        - Games
      summary: Delete a game
      description: Deletes a game by id for the authenticated user.
      operationId: deleteGame
      security:
        - bearerAuth: []
      parameters:
        - name: gameId
          in: path
          required: true
          description: Game id
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Game deleted successfully
          content:
            application/json:
              schema:
                $ref: "./games.schemas.yaml#/components/schemas/MessageResponse"
              example:
                message: Game deleted
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./games.schemas.yaml#/components/schemas/ValidationErrorResponse"
        "401":
          description: Invalid or missing access token
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Invalid token
        "404":
          description: Game or user not found
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              examples:
                userNotFound:
                  value:
                    message: User not found
                gameNotFound:
                  value:
                    message: Game not found
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Internal server error