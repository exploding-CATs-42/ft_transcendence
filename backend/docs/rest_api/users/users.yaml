paths:
  /users/register:
    post:
      tags:
        - Users
      summary: Register a new user
      description: Creates a new user account, creates the first session, and returns access and refresh tokens.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./users.schemas.yaml#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ValidationErrorResponse"
        "409":
          description: Email or username already in use
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              examples:
                emailAlreadyInUse:
                  value:
                    message: Email already in use
                usernameAlreadyInUse:
                  value:
                    message: Username already in use
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Server error

  /users/login:
    post:
      tags:
        - Users
      summary: Login user
      description: Authenticates a user, creates a new session, and returns access and refresh tokens.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./users.schemas.yaml#/components/schemas/LoginRequest"
      responses:
        "200":
          description: User logged in successfully
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ValidationErrorResponse"
        "401":
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Invalid email or password
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Server error

  /users/logout:
    post:
      tags:
        - Users
      summary: Logout current session
      description: Invalidates the current session associated with the provided refresh token.
      operationId: logoutUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./users.schemas.yaml#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Session logged out successfully
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ValidationErrorResponse"
        "401":
          description: Refresh token is invalid or the session does not exist
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              examples:
                invalidRefreshToken:
                  value:
                    message: Invalid refresh token
                sessionNotFound:
                  value:
                    message: Session not found
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Server error

  /users/refresh:
    post:
      tags:
        - Users
      summary: Refresh current session tokens
      description: Verifies the refresh token, validates the current session, rotates the refresh token, and returns a new token pair.
      operationId: refreshSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./users.schemas.yaml#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Tokens refreshed successfully
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/RefreshResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ValidationErrorResponse"
        "401":
          description: Refresh token validation failed
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              examples:
                invalidRefreshToken:
                  value:
                    message: Invalid refresh token
                sessionNotFound:
                  value:
                    message: Session not found
                refreshTokenExpired:
                  value:
                    message: Refresh token expired
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: User not found
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Server error

  /users:
    get:
      tags:
        - Users
      summary: Search users by username
      description: Returns users whose username exactly matches the provided value, using case-insensitive comparison.
      operationId: searchUsers
      parameters:
        - name: username
          in: query
          required: true
          description: Exact username to search for.
          schema:
            type: string
            minLength: 3
            maxLength: 30
            example: alex
      responses:
        "200":
          description: Users returned successfully
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/UserSearchResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ValidationErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Server error

  /users/{userId}:
    get:
      tags:
        - Users
      summary: Get public user profile
      description: Returns public profile information for a user together with basic finished-match statistics.
      operationId: getUserById
      parameters:
        - name: userId
          in: path
          required: true
          description: User id.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User returned successfully
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/UserResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ValidationErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: User not found
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Server error

  /users/{userId}/games:
    get:
      tags:
        - Users
      summary: Get user game history
      description: Returns finished matches for a user.
      operationId: getUserGames
      parameters:
        - name: userId
          in: path
          required: true
          description: User id.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User game history returned successfully
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/UserGamesResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ValidationErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: User not found
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Server error