paths:
  /users:
    get:
      tags:
        - Users
      summary: Search users by username
      description: Returns users whose username exactly matches the provided value, using case-insensitive comparison.
      operationId: searchUsers
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: query
          required: true
          description: Exact username to search for.
          schema:
            type: string
            minLength: 3
            maxLength: 30
            example: alex
      responses:
        "200":
          description: Users returned successfully
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/UserSearchResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ValidationErrorResponse"
        "401":
          description: Invalid or missing access token
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Invalid token
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Internal server error

  /users/{userId}:
    get:
      tags:
        - Users
      summary: Get public user profile
      description: Returns public profile information for a user together with basic finished-game statistics.
      operationId: getUserById
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          description: User id.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User returned successfully
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/UserResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ValidationErrorResponse"
        "401":
          description: Invalid or missing access token
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Invalid token
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: User not found
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Internal server error

  /users/{userId}/games:
    get:
      tags:
        - Users
      summary: Get user game history
      description: Returns finished games for a user.
      operationId: getUserGames
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          description: User id.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User game history returned successfully
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/UserGamesResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ValidationErrorResponse"
        "401":
          description: Invalid or missing access token
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Invalid token
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: User not found
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Internal server error
