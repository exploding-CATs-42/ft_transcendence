paths:
  /users/register:
    post:
      tags:
        - Users
      summary: Register a new user
      description: Creates a new user account, creates the first session, sets the refresh token HttpOnly cookie, and returns the access token.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./users.schemas.yaml#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          headers:
            Set-Cookie:
              description: HttpOnly refresh token cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ValidationErrorResponse"
              example:
                message: Validation error
                errors:
                  formErrors: []
                  fieldErrors:
                    email:
                      - Invalid email address
        "409":
          description: Email or username already in use
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              examples:
                emailAlreadyInUse:
                  summary: Email already in use
                  value:
                    message: Email already in use
                usernameAlreadyInUse:
                  summary: Username already in use
                  value:
                    message: Username already in use
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Server error

  /users/login:
    post:
      tags:
        - Users
      summary: Login user
      description: Authenticates a user, creates a new session, sets the refresh token HttpOnly cookie, and returns the access token.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./users.schemas.yaml#/components/schemas/LoginRequest"
      responses:
        "200":
          description: User logged in successfully
          headers:
            Set-Cookie:
              description: HttpOnly refresh token cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ValidationErrorResponse"
              example:
                message: Validation error
                errors:
                  formErrors: []
                  fieldErrors:
                    email:
                      - Invalid email address
        "401":
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Invalid email or password
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Server error

  /users/logout:
    post:
      tags:
        - Users
      summary: Logout current session
      description: Invalidates the current session associated with the refresh token cookie.
      operationId: logoutUser
      security:
        - refreshTokenCookie: []
      responses:
        "204":
          description: Session logged out successfully
        "401":
          description: Refresh token is missing or invalid, or the session does not exist
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              examples:
                missingRefreshToken:
                  summary: Missing refresh token
                  value:
                    message: Refresh token required
                invalidRefreshToken:
                  summary: Invalid refresh token
                  value:
                    message: Invalid refresh token
                sessionNotFound:
                  summary: Session not found
                  value:
                    message: Session not found
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Server error

  /users/refresh:
    post:
      tags:
        - Users
      summary: Refresh current session tokens
      description: Verifies the refresh token cookie, validates the current session, rotates the refresh token cookie, and returns a new access token.
      operationId: refreshSession
      security:
        - refreshTokenCookie: []
      responses:
        "200":
          description: Tokens refreshed successfully
          headers:
            Set-Cookie:
              description: Rotated HttpOnly refresh token cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/RefreshResponse"
        "401":
          description: Refresh token validation failed
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              examples:
                missingRefreshToken:
                  summary: Missing refresh token
                  value:
                    message: Refresh token required
                invalidRefreshToken:
                  summary: Invalid refresh token
                  value:
                    message: Invalid refresh token
                sessionNotFound:
                  summary: Session not found
                  value:
                    message: Session not found
                refreshTokenExpired:
                  summary: Refresh token expired
                  value:
                    message: Refresh token expired
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: User not found
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Server error