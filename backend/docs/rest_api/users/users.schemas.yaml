components:
  schemas:
    User:
      type: object
      required:
        - id
        - email
        - username
        - avatarUrl
      properties:
        id:
          type: string
          format: uuid
          example: bf85eb09-a2b7-4f66-8f26-90b98e2e9d07
        email:
          type: string
          format: email
          example: alex@example.com
        username:
          type: string
          example: alexfox
        avatarUrl:
          type: string
          nullable: true
          example: null

    PublicProfileUser:
      type: object
      required:
        - id
        - username
        - avatarUrl
        - isOnline
        - lastSeenAt
        - totalMatches
        - wins
      properties:
        id:
          type: string
          format: uuid
          example: bf85eb09-a2b7-4f66-8f26-90b98e2e9d07
        username:
          type: string
          example: alex
        avatarUrl:
          type: string
          nullable: true
          example: null
        isOnline:
          type: boolean
          example: false
        lastSeenAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-04-28T10:00:00.000Z"
        totalMatches:
          type: integer
          example: 10
        wins:
          type: integer
          example: 6

    FriendUser:
      type: object
      required:
        - id
        - username
        - avatarUrl
        - isOnline
        - lastSeenAt
      properties:
        id:
          type: string
          format: uuid
          example: bf85eb09-a2b7-4f66-8f26-90b98e2e9d07
        username:
          type: string
          example: alex
        avatarUrl:
          type: string
          nullable: true
          example: null
        isOnline:
          type: boolean
          example: false
        lastSeenAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-04-28T10:00:00.000Z"

    SelfProfileUser:
      type: object
      required:
        - id
        - email
        - username
        - avatarUrl
        - isOnline
        - lastSeenAt
      properties:
        id:
          type: string
          format: uuid
          example: bf85eb09-a2b7-4f66-8f26-90b98e2e9d07
        email:
          type: string
          format: email
          example: alex@example.com
        username:
          type: string
          example: alexfox
        avatarUrl:
          type: string
          nullable: true
          example: null
        isOnline:
          type: boolean
          example: true
        lastSeenAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-04-28T10:00:00.000Z"

    RegisterRequest:
      type: object
      required:
        - email
        - username
        - password
      properties:
        email:
          type: string
          format: email
          example: alex@example.com
        username:
          type: string
          minLength: 3
          maxLength: 30
          example: alexfox
        password:
          type: string
          minLength: 8
          maxLength: 100
          example: Password123!

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: alex@example.com
        password:
          type: string
          minLength: 8
          maxLength: 100
          example: Password123!

    LogoutRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          example: jwt-refresh-token

    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          example: jwt-refresh-token

    AuthResponse:
      type: object
      required:
        - user
        - accessToken
        - refreshToken
      properties:
        user:
          $ref: "#/components/schemas/User"
        accessToken:
          type: string
          example: jwt-access-token
        refreshToken:
          type: string
          example: jwt-refresh-token

    RefreshResponse:
      type: object
      required:
        - accessToken
        - refreshToken
      properties:
        accessToken:
          type: string
          example: new-jwt-access-token
        refreshToken:
          type: string
          example: new-jwt-refresh-token

    UserResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/PublicProfileUser"

    UserSearchResponse:
      type: object
      required:
        - users
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/PublicProfileUser"

    UserGameHistoryItem:
      type: object
      required:
        - gameId
        - gameName
        - endedAt
        - isWinner
        - players
      properties:
        gameId:
          type: string
          format: uuid
          example: 9cb92b7a-3b28-4af8-854f-a1b6efbda001
        gameName:
          type: string
          example: Friday Night Table
        endedAt:
          type: string
          format: date-time
          example: "2026-04-28T09:52:56.910Z"
        isWinner:
          type: boolean
          example: true
        players:
          type: array
          items:
            $ref: "#/components/schemas/FriendUser"

    UserGamesResponse:
      type: object
      required:
        - games
      properties:
        games:
          type: array
          items:
            $ref: "#/components/schemas/UserGameHistoryItem"

    ApiErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Request failed

    ValidationErrorResponse:
      type: object
      required:
        - message
        - errors
      properties:
        message:
          type: string
          example: Validation error
        errors:
          type: object
          required:
            - formErrors
            - fieldErrors
          properties:
            formErrors:
              type: array
              items:
                type: string
              example: []
            fieldErrors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
              example:
                email:
                  - Invalid email address
                password:
                  - Password must be at least 8 characters