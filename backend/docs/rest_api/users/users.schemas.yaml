components:
  schemas:
    GameStats:
      type: object
      required:
        - totalGames
        - wins
      properties:
        totalGames:
          type: integer
          example: 10
        wins:
          type: integer
          example: 6

    OnlineStatus:
      type: object
      required:
        - isOnline
        - lastSeenAt
      properties:
        isOnline:
          type: boolean
          example: false
        lastSeenAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-04-28T10:00:00.000Z"

    User:
      type: object
      required:
        - id
        - email
        - username
        - avatarUrl
      properties:
        id:
          type: string
          format: uuid
          example: bf85eb09-a2b7-4f66-8f26-90b98e2e9d07
        email:
          type: string
          format: email
          example: alex@example.com
        username:
          type: string
          example: alexfox
        avatarUrl:
          type: string
          format: uri
          nullable: true

    PublicUser:
        type: object
        required:
          - id
          - username
          - avatarUrl
        properties:
          id:
            type: string
            format: uuid
          username:
            type: string
          avatarUrl:
            type: string
            format: uri
            nullable: true

    ProfileUser:
      allOf:
        - $ref: "#/components/schemas/PublicUser"
        - $ref: "#/components/schemas/OnlineStatus"

    ProfileUserWithStats:
      allOf:
      - $ref: "#/components/schemas/ProfileUser"
      - $ref: "#/components/schemas/GameStats"

    FriendUser:
        $ref: "#/components/schemas/ProfileUser"

    UserResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/ProfileUserWithStats"

    UserSearchResponse:
      type: object
      required:
        - users
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/ProfileUserWithStats"

    UserGameHistoryItem:
      type: object
      required:
        - gameId
        - gameName
        - endedAt
        - winnerId
        - players
      properties:
        gameId:
          type: string
          format: uuid
          example: 9cb92b7a-3b28-4af8-854f-a1b6efbda001
        gameName:
          type: string
          example: Friday Night Table
        endedAt:
          type: string
          format: date-time
          example: "2026-04-28T09:52:56.910Z"
        winnerId:
          type: string
          format: uuid
          nullable: true
          example: bf85eb09-a2b7-4f66-8f26-90b98e2e9d07
        players:
          type: array
          items:
            $ref: "#/components/schemas/FriendUser"

    UserGamesResponse:
      type: object
      required:
        - games
      properties:
        games:
          type: array
          items:
            $ref: "#/components/schemas/UserGameHistoryItem"

    ApiErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Request failed

    ValidationErrorResponse:
      type: object
      required:
        - message
        - errors
      properties:
        message:
          type: string
          example: Validation error
        errors:
          type: object
          required:
            - formErrors
            - fieldErrors
          properties:
            formErrors:
              type: array
              items:
                type: string
              example: []
            fieldErrors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
              example:
                email:
                  - Invalid email address
                password:
                  - Password must be at least 8 characters
