paths:
  /users/register:
    post:
      tags:
        - Users
      summary: Register a new user
      description: Creates a new user account and returns access and refresh tokens.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./users.schemas.yaml#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ValidationErrorResponse"
              example:
                message: Validation error
                errors:
                  formErrors: []
                  fieldErrors:
                    email:
                      - Invalid email address
        "409":
          description: Email or username already in use
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Email or username already in use
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Internal server error

  /users/login:
    post:
      tags:
        - Users
      summary: Login user
      description: Authenticates a user, creates a new session, and returns access and refresh tokens.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./users.schemas.yaml#/components/schemas/LoginRequest"
      responses:
        "200":
          description: User logged in successfully
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ValidationErrorResponse"
              example:
                message: Validation error
                errors:
                  formErrors: []
                  fieldErrors:
                    email:
                      - Invalid email address
        "401":
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Invalid email or password
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Internal server error

  /users/logout:
    post:
      tags:
        - Users
      summary: Logout user
      description: Logs the user out by invalidating the current refresh session associated with the provided refresh token.
      operationId: logoutUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./users.schemas.yaml#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: User logged out successfully
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ValidationErrorResponse"
              example:
                message: Validation error
                errors:
                  formErrors: []
                  fieldErrors:
                    refreshToken:
                      - Required
        "401":
          description: Invalid refresh token or session not found
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Invalid refresh token or session not found
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Internal server error

  /users/refresh:
    post:
      tags:
        - Users
      summary: Refresh tokens
      description: Verifies the refresh token, rotates it, updates the session, and returns a new token pair.
      operationId: refreshSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./users.schemas.yaml#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Tokens refreshed successfully
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/RefreshResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ValidationErrorResponse"
              example:
                message: Validation error
                errors:
                  formErrors: []
                  fieldErrors:
                    refreshToken:
                      - Required
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Invalid or expired refresh token
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: User not found
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "./users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Internal server error