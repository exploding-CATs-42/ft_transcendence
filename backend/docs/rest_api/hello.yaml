paths:
  /hello:
    get:
      summary: Say Hello
      description: Returns a Hello World greeting message
      operationId: getHello
      parameters:
        - name: name
          in: query
          description: The name to greet
          required: false
          schema:
            type: string
            example: World
      responses:
        "200":
          description: Successful greeting
          content:
            application/json:
              schema:
                $ref: "./swagger.root.yaml#/components/schemas/HelloResponse"
              example:
                message: Hello, World!
                timestamp: 2026-04-04T12:00:00Z
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "./swagger.root.yaml#/components/schemas/ErrorResponse"

  /hello/{name}:
    get:
      summary: Say Hello to a specific person
      description: Returns a personalised Hello greeting
      operationId: getHelloByName
      parameters:
        - name: name
          in: path
          description: The name to greet
          required: true
          schema:
            type: string
            example: Alice
      responses:
        "200":
          description: Successful greeting
          content:
            application/json:
              schema:
                $ref: "./swagger.root.yaml#/components/schemas/HelloResponse"
              example:
                message: Hello, Alice!
                timestamp: 2026-04-04T12:00:00Z
        "404":
          description: Name not found
          content:
            application/json:
              schema:
                $ref: "./swagger.root.yaml#/components/schemas/ErrorResponse"