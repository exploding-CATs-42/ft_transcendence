paths:
  /me/friends:
    get:
      tags:
        - Friends
      summary: List friendship relations
      description: Returns all friendship relations for the authenticated user. If status=incoming is provided, only incoming pending friend requests are returned.
      operationId: listFriends
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          description: Optional filter. Only "incoming" is supported.
          schema:
            type: string
            enum:
              - incoming
      responses:
        "200":
          description: Friendship relations returned successfully
          content:
            application/json:
              schema:
                $ref: "./friends.schemas.yaml#/components/schemas/FriendsListResponse"
              example:
                friends:
                  - user:
                      id: 183d8fae-06b2-49f6-b5f9-3b31ea511902
                      username: bob
                      avatarUrl: null
                      isOnline: false
                      lastSeenAt: "2026-04-20T09:30:00.000Z"
                    status: ACCEPTED
                    direction: accepted
                  - user:
                      id: 83db6805-d749-4b64-9d19-566d1f3630fb
                      username: dave
                      avatarUrl: null
                      isOnline: false
                      lastSeenAt: "2026-04-19T10:00:00.000Z"
                    status: REJECTED
                    direction: incoming
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ValidationErrorResponse"
        "401":
          description: Invalid or missing access token
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Invalid token
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Server error

    post:
      tags:
        - Friends
      summary: Send friend request
      description: Sends a friend request to another user. If a rejected relation already exists, it is converted back to pending.
      operationId: createFriendRequest
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./friends.schemas.yaml#/components/schemas/CreateFriendRequest"
      responses:
        "201":
          description: Friend request sent successfully
          content:
            application/json:
              schema:
                $ref: "./friends.schemas.yaml#/components/schemas/MessageResponse"
              example:
                message: Friend request sent
        "400":
          description: Validation error or invalid target
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              examples:
                validationError:
                  summary: Validation error
                  value:
                    message: Validation error
                selfRequest:
                  summary: Self friend request
                  value:
                    message: You cannot send a friend request to yourself
        "401":
          description: Invalid or missing access token
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Invalid token
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: User not found
        "409":
          description: Friendship already exists
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Friendship already exists
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Server error

    delete:
      tags:
        - Friends
      summary: Delete friendship relation
      description: Deletes an outgoing pending friend request or an accepted friendship relation.
      operationId: deleteFriendship
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./friends.schemas.yaml#/components/schemas/DeleteFriendshipRequest"
      responses:
        "200":
          description: Friendship deleted successfully
          content:
            application/json:
              schema:
                $ref: "./friends.schemas.yaml#/components/schemas/MessageResponse"
              example:
                message: Friendship deleted
        "400":
          description: Validation error or invalid target
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ValidationErrorResponse"
        "401":
          description: Invalid or missing access token
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Invalid token
        "404":
          description: Friendship not found
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Friendship not found
        "409":
          description: Friendship cannot be deleted
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Friendship cannot be deleted
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Server error

  /me/friends/{userId}:
    patch:
      tags:
        - Friends
      summary: Update friendship relation
      description: Accepts or rejects an incoming pending friend request.
      operationId: updateFriendship
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          description: User id of the other side of the friendship relation.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./friends.schemas.yaml#/components/schemas/UpdateFriendshipRequest"
      responses:
        "200":
          description: Friendship updated successfully
          content:
            application/json:
              schema:
                $ref: "./friends.schemas.yaml#/components/schemas/MessageResponse"
              example:
                message: Friendship updated
        "400":
          description: Validation error or invalid target
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ValidationErrorResponse"
        "401":
          description: Invalid or missing access token
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Invalid token
        "404":
          description: Friendship not found
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Friendship not found
        "409":
          description: Friendship cannot be updated
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              examples:
                onlyPending:
                  summary: Only pending friendships can be updated
                  value:
                    message: Only pending friendships can be updated
                outgoingRequest:
                  summary: Cannot update outgoing request
                  value:
                    message: You cannot update your own outgoing request
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Server error