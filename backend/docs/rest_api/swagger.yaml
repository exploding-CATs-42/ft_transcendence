openapi: 3.0.3

info:
  title: Transcendence REST API
  version: 1.0.0
  description: REST API documentation for the ft_transcendence backend.

servers:
  - url: http://localhost:8080/api
    description: Docker + Nginx local development
  - url: http://localhost:3000/api
    description: Backend-only local development

tags:
  - name: Users
    description: User authentication and public user data
  - name: Me
    description: Current authenticated user profile
  - name: Friends
    description: Friendship management for the current authenticated user

paths:
  /users/register:
    $ref: "users/users.yaml#/paths/~1users~1register"
  /users/login:
    $ref: "users/users.yaml#/paths/~1users~1login"
  /users/logout:
    $ref: "users/users.yaml#/paths/~1users~1logout"
  /users/refresh:
    $ref: "users/users.yaml#/paths/~1users~1refresh"
  /users:
    $ref: "users/users.yaml#/paths/~1users"
  /users/{userId}:
    $ref: "users/users.yaml#/paths/~1users~1{userId}"
  /users/{userId}/games:
    $ref: "users/users.yaml#/paths/~1users~1{userId}~1games"
  /me:
    $ref: "me/me.yaml#/paths/~1me"
  /me/friends:
    $ref: "friends/friends.yaml#/paths/~1me~1friends"
  /me/friends/{userId}:
    $ref: "friends/friends.yaml#/paths/~1me~1friends~1{userId}"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      $ref: "users/users.schemas.yaml#/components/schemas/User"
    PublicProfileUser:
      $ref: "users/users.schemas.yaml#/components/schemas/PublicProfileUser"
    FriendUser:
      $ref: "users/users.schemas.yaml#/components/schemas/FriendUser"
    SelfProfileUser:
      $ref: "users/users.schemas.yaml#/components/schemas/SelfProfileUser"
    RegisterRequest:
      $ref: "users/users.schemas.yaml#/components/schemas/RegisterRequest"
    LoginRequest:
      $ref: "users/users.schemas.yaml#/components/schemas/LoginRequest"
    LogoutRequest:
      $ref: "users/users.schemas.yaml#/components/schemas/LogoutRequest"
    RefreshRequest:
      $ref: "users/users.schemas.yaml#/components/schemas/RefreshRequest"
    AuthResponse:
      $ref: "users/users.schemas.yaml#/components/schemas/AuthResponse"
    RefreshResponse:
      $ref: "users/users.schemas.yaml#/components/schemas/RefreshResponse"
    UserResponse:
      $ref: "users/users.schemas.yaml#/components/schemas/UserResponse"
    UserSearchResponse:
      $ref: "users/users.schemas.yaml#/components/schemas/UserSearchResponse"
    UserGameHistoryItem:
      $ref: "users/users.schemas.yaml#/components/schemas/UserGameHistoryItem"
    UserGamesResponse:
      $ref: "users/users.schemas.yaml#/components/schemas/UserGamesResponse"
    UpdateMeRequest:
      $ref: "me/me.schemas.yaml#/components/schemas/UpdateMeRequest"
    UpdateMeResponse:
      $ref: "me/me.schemas.yaml#/components/schemas/UpdateMeResponse"
    FriendListItem:
      $ref: "friends/friends.schemas.yaml#/components/schemas/FriendListItem"
    FriendsListResponse:
      $ref: "friends/friends.schemas.yaml#/components/schemas/FriendsListResponse"
    CreateFriendRequest:
      $ref: "friends/friends.schemas.yaml#/components/schemas/CreateFriendRequest"
    UpdateFriendshipRequest:
      $ref: "friends/friends.schemas.yaml#/components/schemas/UpdateFriendshipRequest"
    DeleteFriendshipRequest:
      $ref: "friends/friends.schemas.yaml#/components/schemas/DeleteFriendshipRequest"
    MessageResponse:
      $ref: "friends/friends.schemas.yaml#/components/schemas/MessageResponse"
    ApiErrorResponse:
      $ref: "users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
    ValidationErrorResponse:
      $ref: "users/users.schemas.yaml#/components/schemas/ValidationErrorResponse"