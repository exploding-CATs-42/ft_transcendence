paths:
  /me:
    get:
      tags:
        - Me
      summary: Get current user profile
      description: Retrieves the authenticated user's profile information.
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: "./me.schemas.yaml#/components/schemas/GetMeResponse"
        "401":
          description: Invalid or missing access token
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Invalid token
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: User not found
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Internal server error
    patch:
      tags:
        - Me
      summary: Update current user profile
      description: Updates the authenticated user's profile fields. At least one field must be provided. Both passwordOld and passwordNew must be provided together to change password.
      operationId: updateMe
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./me.schemas.yaml#/components/schemas/UpdateMeRequest"
      responses:
        "200":
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: "./me.schemas.yaml#/components/schemas/UpdateMeResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ValidationErrorResponse"
              examples:
                validationError:
                  value:
                    message: Validation error

                noFieldsProvided:
                  value:
                    message: At least one field must be provided
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              examples:
                invalidToken:
                  summary: Invalid or missing access token
                  value:
                    message: Invalid token

                invalidCurrentPassword:
                  summary: Current password is incorrect
                  value:
                    message: Please enter valid password
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: User not found
        "409":
          description: Request conflict
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              examples:
                emailAlreadyInUse:
                  value:
                    message: Email already in use 
                missingCurrentPassword:
                  summary: New password provided without current password
                  value:
                    message: Enter your current password to set a new password

                missingNewPassword:
                  summary: Current password provided without new password
                  value:
                    message: Enter your new password
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Internal server error
  /me/avatar:
    patch:
      tags:
        - Me
      summary: Update user avatar
      description: Updates the authenticated user's avatar. Accepts image file upload via multipart form data.
      operationId: updateMeAvatar
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - avatar
              properties:
                avatar:
                  type: string
                  format: binary
                  description: Avatar image file
      responses:
        "200":
          description: Avatar updated successfully
          content:
            application/json:
              schema:
                $ref: "./me.schemas.yaml#/components/schemas/UpdateAvatarResponse"
        "400":
          description: Invalid file or validation error
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ValidationErrorResponse"
        "401":
          description: Invalid or missing access token
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Invalid token
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: User not found
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Internal server error
  /me/games:
    get:
      tags:
        - Me
      summary: Get current user's games
      description: Retrieves all games that the authenticated user is participating in or has participated in.
      operationId: getMeGames
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User games retrieved successfully
          content:
            application/json:
              schema:
                $ref: "./me.schemas.yaml#/components/schemas/GetMeGamesResponse"
        "401":
          description: Invalid or missing access token
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Invalid token
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: User not found
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "../users/users.schemas.yaml#/components/schemas/ApiErrorResponse"
              example:
                message: Internal server error