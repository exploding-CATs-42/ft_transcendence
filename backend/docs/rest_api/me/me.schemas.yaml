components:
  schemas:
    MyProfileUser:
      allOf:
        - $ref: "../users/users.schemas.yaml#/components/schemas/User"
        - $ref: "../users/users.schemas.yaml#/components/schemas/OnlineStatus"

    MyProfileUserWithStats:
      allOf:
        - $ref: "#/components/schemas/MyProfileUser"
        - $ref: "../users/users.schemas.yaml#/components/schemas/GameStats"

    GetMeResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/MyProfileUserWithStats"

    UpdateMeRequest:
      type: object
      minProperties: 1
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
          example: alex_new
        email:
          type: string
          format: email
          example: alex_new@example.com
        passwordOld:
          type: string
          minLength: 8
          maxLength: 100
          description: Current password - required when updating password
          example: OldPassword123!
        passwordNew:
          type: string
          minLength: 8
          maxLength: 100
          description: New password - required when updating password
          example: NewPassword123!

    UpdateMeResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/MyProfileUser"

    UpdateAvatarResponse:
      type: object
      required:
        - avatarUrl
      properties:
        avatarUrl:
          type: string
          format: uri
          example: https://res.cloudinary.com/example/image/upload/v1234567890/avatar.png

    GetMeGamesResponse:
      type: object
      required:
        - games
      properties:
        games:
          type: array
          items:
            $ref: "../users/users.schemas.yaml#/components/schemas/UserGameHistoryItem"
            description: Game object with game details

    MessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Operation completed