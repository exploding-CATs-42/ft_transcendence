groups:
  - name: transcendence-availability
    rules:
      - alert: ServiceUnavailable
        expr: probe_success{job="blackbox"} == 0
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }} is unavailable"
          description: "The {{ $labels.service }} service has failed availability checks for more than 30 seconds."
