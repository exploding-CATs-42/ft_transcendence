services:
  nginx:
    build:
      context: ../nginx
      dockerfile: Dockerfile
    container_name: ft-nginx
    ports:
      - "${NGINX_PORT}:80"
    environment:
      PARANOIA: 2
      BLOCKING_PARANOIA: 2
      ANOMALY_INBOUND: 5
      ANOMALY_OUTBOUND: 4
      MODSEC_RULE_ENGINE: On
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - transcendence_net

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
      target: dev
    container_name: ft-backend
    env_file:
      - ../env/.env
      - ../../backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    volumes:
      - ../../backend:/app/backend
      - backend_node_modules:/app/backend/node_modules
    networks:
      - transcendence_net

  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
      target: dev
    container_name: ft-frontend
    env_file:
      - ../env/.env
      - ../../frontend/.env
    expose:
      - "5173"
    volumes:
      - ../../frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    networks:
      - transcendence_net

  postgres:
    image: postgres:16-alpine
    container_name: ft-postgres
    env_file:
      - ../env/.env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - transcendence_net

volumes:
  postgres_data:
  monorepo_node_modules: # root node_modules
  backend_node_modules: # backend's own node_modules
  frontend_node_modules: # frontend's own node_modules

networks:
  transcendence_net:
    driver: bridge
