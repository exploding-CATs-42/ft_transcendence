services:
  nginx:
    build:
      context: ../nginx
      dockerfile: Dockerfile
    container_name: ft-nginx
    ports:
      - "${NGINX_PORT}:80"
    depends_on:
      - backend
      - frontend
    networks:
      - transcendence_net

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
      target: dev
    container_name: ft-backend
    env_file:
      - ../env/.env
      - ../../backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      libraries:
        condition: service_completed_successfully
    expose:
      - "3000"
    volumes:
      - ../../:/app
      - backend_node_modules:/app/backend/node_modules
      - shared_node_modules:/app/node_modules
      - schemas_node_modules:/app/packages/schemas/node_modules
      - types_node_modules:/app/packages/types/node_modules
    networks:
      - transcendence_net

  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
      target: dev
    container_name: ft-frontend
    env_file:
      - ../env/.env
      - ../../frontend/.env
    depends_on:
      libraries:
        condition: service_completed_successfully
    expose:
      - "5173"
    volumes:
      - ../../:/app
      - frontend_node_modules:/app/frontend/node_modules
      - shared_node_modules:/app/node_modules
      - schemas_node_modules:/app/packages/schemas/node_modules
      - types_node_modules:/app/packages/types/node_modules
    networks:
      - transcendence_net

  postgres:
    image: postgres:16-alpine
    container_name: ft-postgres
    env_file:
      - ../env/.env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - transcendence_net

  libraries:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: ft-libraries
    volumes:
      - shared_node_modules:/app/node_modules
      - frontend_node_modules:/app/frontend/node_modules
      - backend_node_modules:/app/backend/node_modules
      - schemas_node_modules:/app/packages/schemas/node_modules
      - types_node_modules:/app/packages/types/node_modules

volumes:
  postgres_data:
  shared_node_modules:
  backend_node_modules:
  frontend_node_modules:
  schemas_node_modules:
  types_node_modules:

networks:
  transcendence_net:
    driver: bridge
