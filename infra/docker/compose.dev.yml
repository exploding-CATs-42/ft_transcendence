services:
  nginx:
    build:
      context: ../nginx
      dockerfile: Dockerfile
    container_name: ft-nginx
    ports:
      - "${NGINX_PORT}:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - transcendence_net

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
      target: dev
    container_name: ft-backend
    env_file:
      - ../env/.env
      - ../../backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    volumes:
      - ../../:/app
      - monorepo_node_modules:/app/node_modules
      - backend_node_modules:/app/backend/node_modules
    networks:
      - transcendence_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
      target: dev
    container_name: ft-frontend
    env_file:
      - ../env/.env
      - ../../frontend/.env
    expose:
      - "5173"
    volumes:
      - ../../:/app
      - monorepo_node_modules:/app/node_modules
      - frontend_node_modules:/app/frontend/node_modules
    networks:
      - transcendence_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5173/"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    container_name: ft-postgres
    env_file:
      - ../env/.env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - transcendence_net

volumes:
  postgres_data:
  monorepo_node_modules: # root node_modules
  backend_node_modules: # backend's own node_modules
  frontend_node_modules: # frontend's own node_modules

networks:
  transcendence_net:
    driver: bridge
