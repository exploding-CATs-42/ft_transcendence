services:
  nginx:
    build:
      context: ../nginx
      dockerfile: Dockerfile
    container_name: ft-nginx
    ports:
      - "${NGINX_PORT}:80"
    depends_on:
      - backend
      - frontend
    networks:
      - transcendence_net

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: ft-backend
    env_file:
      - ../env/.env
      - ../../backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    volumes:
      - ../../backend:/app
      - backend_node_modules:/app/node_modules
    networks:
      - transcendence_net
      
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: ft-frontend
    env_file:
      - ../env/.env
      - ../../frontend/.env
    expose:
      - "5173"
    volumes:
      - ../../frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - transcendence_net

  postgres:
    image: postgres:16-alpine
    container_name: ft-postgres
    env_file:
      - ../env/.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - transcendence_net

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  transcendence_net:
    driver: bridge