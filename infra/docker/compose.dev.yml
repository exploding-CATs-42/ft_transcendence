services:
  nginx:
    build:
      context: ../nginx
      dockerfile: Dockerfile
    container_name: ft-nginx
    ports:
      - "${NGINX_PORT}:80"
    depends_on:
      - backend
      - frontend
    networks:
      - transcendence_net

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
      target: dev
    container_name: ft-backend
    env_file:
      - ../env/.env
      - ../../backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      libraries:
        condition: service_completed_successfully
    expose:
      - "3000"
    volumes:
      - ../../:/app
      - backend_node_modules:/app/backend/node_modules
      - shared_node_modules:/app/node_modules
      - contracts_node_modules:/app/packages/contracts/node_modules
      - game_node_modules:/app/packages/game/node_modules
    networks:
      - transcendence_net

  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
      target: dev
    container_name: ft-frontend
    env_file:
      - ../env/.env
      - ../../frontend/.env
    depends_on:
      libraries:
        condition: service_completed_successfully
    expose:
      - "5173"
    volumes:
      - ../../:/app
      - frontend_node_modules:/app/frontend/node_modules
      - shared_node_modules:/app/node_modules
      - contracts_node_modules:/app/packages/contracts/node_modules
      - game_node_modules:/app/packages/game/node_modules
    networks:
      - transcendence_net

  postgres:
    image: postgres:16-alpine
    container_name: ft-postgres
    env_file:
      - ../env/.env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - transcendence_net
    
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ft-prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - prometheus_data:/prometheus
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    networks:
      - transcendence_net
    
  alertmanager:
    image: prom/alertmanager:v0.32.1
    container_name: ft-alertmanager
    profiles:
      - alerts
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    expose:
      - "9093"
    volumes:
      - alertmanager_data:/alertmanager
      - ../monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    secrets:
      - telegram_bot_token
      - telegram_chat_id
    networks:
      - transcendence_net

  grafana:
    image: grafana/grafana:11.3.1
    container_name: ft-grafana
    env_file:
     - ../env/.env
    ports:
      - "${GRAFANA_PORT}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - transcendence_net
  libraries:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: ft-libraries
    volumes:
      - shared_node_modules:/app/node_modules
      - frontend_node_modules:/app/frontend/node_modules
      - backend_node_modules:/app/backend/node_modules
      - contracts_node_modules:/app/packages/contracts/node_modules
      - game_node_modules:/app/packages/game/node_modules

volumes:
  postgres_data:
  shared_node_modules:
  contracts_node_modules:
  game_node_modules:
  monorepo_node_modules:
  backend_node_modules:
  frontend_node_modules:
  grafana_data:
  prometheus_data:
  alertmanager_data:

secrets:
  telegram_bot_token:
    file: ../secrets/telegram_bot_token
  telegram_chat_id:
    file: ../secrets/telegram_chat_id

networks:
  transcendence_net:
    driver: bridge
